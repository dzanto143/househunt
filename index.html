<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Finder</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#0066cc;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:15px;
}

.hero{
background:#0077e6;
color:white;
padding:50px;
text-align:center;
}

.search-box{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.search-box input,
.search-box select{
padding:10px;
width:200px;
}

button{
background:#28a745;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

.container{
width:90%;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.available{
color:green;
font-weight:bold;
}

.occupied{
color:red;
font-weight:bold;
}

.favorite-btn{
background:#ff4081;
margin-top:10px;
}

.admin-section{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
}

.admin-section input,
.admin-section select{
width:100%;
padding:10px;
margin:8px 0;
}

h2{
margin-bottom:15px;
}

@media(max-width:768px){
header{
flex-direction:column;
}

.search-box{
flex-direction:column;
align-items:center;
}
}
</style>
</head>
<body>

<header>
<div class="logo">Property Finder</div>

<nav>
<a href="#">Home</a>
<a href="#">Properties</a>
<a href="#">Favorites (<span id="favCount">0</span>)</a>
<a href="#">Login</a>
<a href="#">Register</a>
</nav>
</header>

<section class="hero">

<h1>Find Your Perfect Rental Property</h1>

<div class="search-box">

<input type="text" id="searchLocation"
placeholder="Location">

<select id="propertyType">
<option value="">All Types</option>
<option>Single Room</option>
<option>Bedsitter</option>
<option>One Bedroom</option>
<option>Two Bedroom</option>
<option>Three Bedroom</option>
</select>

<input type="number"
id="maxPrice"
placeholder="Max Price">

<button onclick="filterProperties()">
Search
</button>

</div>

</section>

<div class="container">

<h2>Available Properties</h2>

<div class="grid" id="propertyGrid"></div>

<div class="admin-section">

<h2>Admin Dashboard</h2>

<input type="text"
id="title"
placeholder="Property Title">

<input type="text"
id="location"
placeholder="Location">

<input type="number"
id="price"
placeholder="Price">

<select id="type">
<option>Single Room</option>
<option>Bedsitter</option>
<option>One Bedroom</option>
<option>Two Bedroom</option>
<option>Three Bedroom</option>
</select>

<input type="text"
id="image"
placeholder="Image URL">

<select id="status">
<option>Available</option>
<option>Occupied</option>
</select>

<button onclick="addProperty()">
Add Property
</button>

</div>

</div>

<script>

let properties = JSON.parse(
localStorage.getItem("properties")
) || [

{
id:1,
title:"Single Room",
location:"Nairobi",
price:5000,
type:"Single Room",
image:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85",
status:"Available"
},

{
id:2,
title:"Bedsitter",
location:"Nakuru",
price:8000,
type:"Bedsitter",
image:"https://images.unsplash.com/photo-1484154218962-a197022b5858",
status:"Available"
},

{
id:3,
title:"One Bedroom",
location:"Kisumu",
price:15000,
type:"One Bedroom",
image:"https://images.unsplash.com/photo-1494526585095-c41746248156",
status:"Occupied"
}

];

let favorites = JSON.parse(
localStorage.getItem("favorites")
) || [];

function saveProperties(){
localStorage.setItem(
"properties",
JSON.stringify(properties)
);
}

function displayProperties(list){

let html="";

list.forEach(property=>{

html += `

<div class="card">

<img src="${property.image}">

<div class="card-content">

<h3>${property.title}</h3>

<p><strong>Location:</strong>
${property.location}</p>

<p><strong>Type:</strong>
${property.type}</p>

<p><strong>Price:</strong>
KES ${property.price}</p>

<p class="${
property.status=="Available"
? "available"
: "occupied"
}">
${property.status}
</p>

<button onclick="addFavorite(${property.id})"
class="favorite-btn">
Add Favorite
</button>

<button onclick="deleteProperty(${property.id})">
Delete
</button>

</div>

</div>

`;

});

document.getElementById(
"propertyGrid"
).innerHTML = html;

}

function filterProperties(){

let location =
document.getElementById(
"searchLocation"
).value.toLowerCase();

let type =
document.getElementById(
"propertyType"
).value;

let maxPrice =
document.getElementById(
"maxPrice"
).value;

let filtered =
properties.filter(p=>{

return (
(location=="" ||
p.location.toLowerCase()
.includes(location))
&&
(type=="" ||
p.type==type)
&&
(maxPrice=="" ||
p.price <= maxPrice)
);

});

displayProperties(filtered);

}

function addProperty(){

let property = {

id:Date.now(),

title:
document.getElementById(
"title"
).value,

location:
document.getElementById(
"location"
).value,

price:
document.getElementById(
"price"
).value,

type:
document.getElementById(
"type"
).value,

image:
document.getElementById(
"image"
).value,

status:
document.getElementById(
"status"
).value

};

properties.push(property);

saveProperties();

displayProperties(properties);

alert("Property Added");

}

function deleteProperty(id){

properties =
properties.filter(
p=>p.id !== id
);

saveProperties();

displayProperties(properties);

}

function addFavorite(id){

if(!favorites.includes(id)){

favorites.push(id);

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
);

updateFavorites();

alert("Added to favorites");

}

}

function updateFavorites(){

document.getElementById(
"favCount"
).innerText =
favorites.length;

}

displayProperties(properties);

updateFavorites();

</script>

</body>
</html>
